<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Monitor de Acessos</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: white; border-radius: 20px; padding: 20px 30px; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .logo h1 { font-size: 24px; color: #667eea; margin-bottom: 5px; }
        .logo p { color: #666; font-size: 12px; }
        .auth-section { display: flex; align-items: center; gap: 20px; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .user-details { text-align: right; }
        .user-name { font-weight: 600; color: #333; }
        .user-email { font-size: 12px; color: #666; }
        .btn-google, .btn-logout { padding: 12px 24px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 10px; }
        .btn-google { background: #4285f4; color: white; }
        .btn-google:hover { background: #357ae8; transform: translateY(-2px); }
        .btn-logout { background: #dc3545; color: white; }
        .btn-logout:hover { background: #c82333; transform: translateY(-2px); }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; background: white; padding: 10px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab { flex: 1; padding: 15px; text-align: center; background: #f8f9fa; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 600; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .tab.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.3s ease; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-icon { font-size: 40px; margin-bottom: 10px; }
        .stat-number { font-size: 32px; font-weight: 800; margin-bottom: 5px; }
        .stat-label { color: #666; font-size: 14px; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .chart-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .chart-card h3 { margin-bottom: 15px; color: #333; }
        canvas { max-height: 300px; }
        .table-container { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow-x: auto; }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .search-box { display: flex; gap: 10px; }
        .search-box input, .filter-select { padding: 10px 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; }
        .search-box input { width: 250px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #e0e0e0; }
        td { padding: 12px; border-bottom: 1px solid #e0e0e0; }
        tr:hover { background: #f8f9fa; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
        .badge-permitido { background: #d4edda; color: #155724; }
        .badge-irregular { background: #f8d7da; color: #721c24; }
        .severity-high { background: #dc3545; color: white; }
        .severity-medium { background: #ffc107; color: #333; }
        .severity-low { background: #28a745; color: white; }
        .loading { text-align: center; padding: 50px; font-size: 18px; color: white; }
        .error-message { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 4px solid #dc3545; }
        .info-message { background: #d1ecf1; color: #0c5460; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 4px solid #17a2b8; }
        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            .charts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1><i class="fas fa-shield-alt"></i> Monitor de Acessos</h1>
                <p>Painel de controle de segurança</p>
            </div>
            <div class="auth-section" id="authSection"></div>
        </div>
        
        <div id="errorMessages"></div>
        <div id="infoMessages"></div>
        
        <div id="content" style="display: none;">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('checkuser')">
                    <i class="fas fa-check-circle"></i> Acessos Permitidos
                </button>
                <button class="tab" onclick="switchTab('irregular')">
                    <i class="fas fa-exclamation-triangle"></i> Acessos Irregulares
                </button>
            </div>
            
            <div class="stats-grid" id="statsGrid"></div>
            
            <div class="charts-grid">
                <div class="chart-card">
                    <h3><i class="fas fa-chart-line"></i> Acessos por Dia</h3>
                    <canvas id="dailyChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3><i class="fas fa-globe"></i> Acessos por País</h3>
                    <canvas id="countryChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3><i class="fas fa-chrome"></i> Navegadores</h3>
                    <canvas id="browserChart"></canvas>
                </div>
            </div>
            
            <div class="table-container">
                <div class="table-header">
                    <h3 id="tableTitle"><i class="fas fa-list"></i> Últimos Acessos</h3>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Buscar por IP, país ou navegador..." onkeyup="filterTable()">
                        <select id="filterType" class="filter-select" onchange="filterTable()">
                            <option value="all">Todos os tipos</option>
                            <option value="permitido">Permitidos</option>
                            <option value="irregular">Irregulares</option>
                        </select>
                        <button onclick="refreshData()" class="filter-select" style="background: #667eea; color: white; border: none;">
                            <i class="fas fa-sync-alt"></i> Atualizar
                        </button>
                    </div>
                </div>
                <div style="overflow-x: auto;">
                    <table id="acessosTable">
                        <thead>
                            <tr><th>Data/Hora</th><th>IP</th><th>Localização</th><th>Navegador</th><th>Status</th><th>Detalhes</th></tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="6" style="text-align: center;">Aguardando dados...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div id="loading" class="loading" style="display: none;">
            <i class="fas fa-spinner fa-spin"></i> Carregando dados...
        </div>
    </div>
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, getDocs, query, orderBy, limit } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        
        const firebaseConfig = {
            apiKey: "AIzaSyB9GkSqTIZ0kbVsba_WOdQeVAETrF9qna0",
            authDomain: "wzzm-ce3fc.firebaseapp.com",
            projectId: "wzzm-ce3fc",
            storageBucket: "wzzm-ce3fc.appspot.com",
            messagingSenderId: "249427877153",
            appId: "1:249427877153:web:0e4297294794a5aadeb260"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        let currentUser = null;
        let currentTab = 'checkuser';
        let allData = [];
        let dailyChart, countryChart, browserChart;
        
        const authSection = document.getElementById('authSection');
        const content = document.getElementById('content');
        const loading = document.getElementById('loading');
        const errorDiv = document.getElementById('errorMessages');
        const infoDiv = document.getElementById('infoMessages');
        
        function showError(message) {
            errorDiv.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-circle"></i> ${message}</div>`;
            setTimeout(() => { if(errorDiv.innerHTML) errorDiv.innerHTML = ''; }, 8000);
        }
        
        function showInfo(message) {
            infoDiv.innerHTML = `<div class="info-message"><i class="fas fa-info-circle"></i> ${message}</div>`;
            setTimeout(() => { if(infoDiv.innerHTML) infoDiv.innerHTML = ''; }, 5000);
        }
        
        function updateAuthUI(user) {
            if (user) {
                authSection.innerHTML = `
                    <div class="user-info">
                        <div class="user-details">
                            <div class="user-name">${user.displayName || 'Usuário'}</div>
                            <div class="user-email">${user.email}</div>
                        </div>
                        <img class="user-avatar" src="${user.photoURL || 'https://via.placeholder.com/50'}" alt="Avatar">
                        <button class="btn-logout" onclick="window.logout()">
                            <i class="fas fa-sign-out-alt"></i> Sair
                        </button>
                    </div>
                `;
                content.style.display = 'block';
                loadAllData();
            } else {
                authSection.innerHTML = `
                    <button class="btn-google" onclick="window.loginWithGoogle()">
                        <i class="fab fa-google"></i> Entrar com Google
                    </button>
                `;
                content.style.display = 'none';
            }
        }
        
        window.loginWithGoogle = async function() {
            try {
                loading.style.display = 'block';
                const result = await signInWithPopup(auth, provider);
                console.log('Login bem-sucedido:', result.user.email);
                showInfo(`Bem-vindo, ${result.user.displayName || result.user.email}!`);
                loading.style.display = 'none';
            } catch (error) {
                loading.style.display = 'none';
                console.error('Erro no login:', error);
                showError('Erro ao fazer login: ' + error.message);
            }
        }
        
        window.logout = async function() {
            try {
                await signOut(auth);
                showInfo('Logout realizado com sucesso!');
            } catch (error) {
                showError('Erro ao sair: ' + error.message);
            }
        }
        
        async function loadAllData() {
            loading.style.display = 'block';
            try {
                await loadStats();
                await loadAcessos();
                await loadCharts();
                showInfo('Dados atualizados com sucesso!');
            } catch (error) {
                console.error('Erro ao carregar dados:', error);
                showError('Erro ao carregar dados: ' + error.message);
            } finally {
                loading.style.display = 'none';
            }
        }
        
        async function loadStats() {
            try {
                const checkuserSnapshot = await getDocs(collection(db, "checkuser"));
                const irregularSnapshot = await getDocs(collection(db, "irregularacesscheckuser"));
                
                const totalPermitidos = checkuserSnapshot.size;
                const totalIrregulares = irregularSnapshot.size;
                const totalAcessos = totalPermitidos + totalIrregulares;
                
                const hoje = new Date().toISOString().split('T')[0];
                let acessosHoje = 0;
                
                const allDocs = [...checkuserSnapshot.docs, ...irregularSnapshot.docs];
                allDocs.forEach(doc => {
                    const data = doc.data();
                    if (data.registeredAtISO && data.registeredAtISO.split('T')[0] === hoje) {
                        acessosHoje++;
                    }
                });
                
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                        <div class="stat-number">${totalAcessos}</div>
                        <div class="stat-label">Total de Acessos</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-check-circle" style="color: #28a745;"></i></div>
                        <div class="stat-number">${totalPermitidos}</div>
                        <div class="stat-label">Acessos Permitidos</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-exclamation-triangle" style="color: #dc3545;"></i></div>
                        <div class="stat-number">${totalIrregulares}</div>
                        <div class="stat-label">Acessos Irregulares</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-calendar-day"></i></div>
                        <div class="stat-number">${acessosHoje}</div>
                        <div class="stat-label">Acessos Hoje</div>
                    </div>
                `;
            } catch (error) {
                console.error('Erro ao carregar estatísticas:', error);
                document.getElementById('statsGrid').innerHTML = '<div class="stat-card">Erro ao carregar estatísticas</div>';
            }
        }
        
        async function loadAcessos() {
            try {
                const collectionRef = collection(db, currentTab);
                const q = query(collectionRef, orderBy("timestamp", "desc"), limit(100));
                const querySnapshot = await getDocs(q);
                
                allData = [];
                querySnapshot.forEach(doc => {
                    allData.push({ id: doc.id, ...doc.data() });
                });
                
                console.log(`Carregados ${allData.length} registros da coleção ${currentTab}`);
                
                if (allData.length === 0) {
                    document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" style="text-align: center;">Nenhum acesso encontrado nesta coleção</td></tr>';
                } else {
                    renderTable();
                }
            } catch (error) {
                console.error('Erro ao carregar acessos:', error);
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="6" style="text-align: center;">Erro ao carregar dados: ${error.message}</td></tr>`;
            }
        }
        
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filterType = document.getElementById('filterType').value;
            
            let filteredData = allData.filter(item => {
                if (filterType === 'permitido' && item.acessoPermitido === false) return false;
                if (filterType === 'irregular' && item.acessoPermitido !== false) return false;
                
                if (searchTerm) {
                    return (
                        (item.ip && item.ip.toLowerCase().includes(searchTerm)) ||
                        (item.country && item.country.toLowerCase().includes(searchTerm)) ||
                        (item.city && item.city.toLowerCase().includes(searchTerm)) ||
                        (item.browser && item.browser.toLowerCase().includes(searchTerm))
                    );
                }
                return true;
            });
            
            if (filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Nenhum acesso encontrado com os filtros aplicados</td></tr>';
                return;
            }
            
            tbody.innerHTML = filteredData.map(item => {
                let dataHora = item.registeredAtLocal || 'Data não disponível';
                if (item.timestamp?.toDate) {
                    dataHora = item.timestamp.toDate().toLocaleString('pt-BR');
                }
                
                const localizacao = `${item.city || 'N/A'}, ${item.country || 'N/A'}`;
                const status = item.acessoPermitido !== false ? 
                    '<span class="badge badge-permitido"><i class="fas fa-check"></i> Permitido</span>' : 
                    '<span class="badge badge-irregular"><i class="fas fa-exclamation"></i> Irregular</span>';
                
                let detalhes = '';
                if (item.acessoPermitido === false && item.irregularidades) {
                    const severidade = item.severidade || 'BAIXA';
                    const severidadeClass = severidade === 'ALTA' ? 'severity-high' : (severidade === 'MEDIA' ? 'severity-medium' : 'severity-low');
                    detalhes = `<span class="badge ${severidadeClass}">${severidade}</span>`;
                    if (item.motivoIrregularidade) {
                        detalhes += `<br><small>${item.motivoIrregularidade.substring(0, 50)}</small>`;
                    }
                }
                
                return `
                    <tr>
                        <td style="white-space: nowrap;">${dataHora}</td>
                        <td><code>${item.ip || 'N/A'}</code></td>
                        <td>${localizacao}</td>
                        <td>${item.browser || 'N/A'}</td>
                        <td>${status}</td>
                        <td>${detalhes}</td>
                    </tr>
                `;
            }).join('');
        }
        
        async function loadCharts() {
            try {
                const checkuserSnapshot = await getDocs(collection(db, "checkuser"));
                const irregularSnapshot = await getDocs(collection(db, "irregularacesscheckuser"));
                const allDocs = [...checkuserSnapshot.docs, ...irregularSnapshot.docs];
                
                const last7Days = {};
                for (let i = 6; i >= 0; i--) {
                    const date = new Date();
                    date.setDate(date.getDate() - i);
                    const dateStr = date.toISOString().split('T')[0];
                    last7Days[dateStr] = 0;
                }
                
                const countries = {};
                const browsers = {};
                
                allDocs.forEach(doc => {
                    const data = doc.data();
                    
                    if (data.registeredAtISO) {
                        const date = data.registeredAtISO.split('T')[0];
                        if (last7Days[date] !== undefined) last7Days[date]++;
                    }
                    
                    if (data.country) countries[data.country] = (countries[data.country] || 0) + 1;
                    if (data.browser) browsers[data.browser] = (browsers[data.browser] || 0) + 1;
                });
                
                if (dailyChart) dailyChart.destroy();
                if (countryChart) countryChart.destroy();
                if (browserChart) browserChart.destroy();
                
                const ctx1 = document.getElementById('dailyChart').getContext('2d');
                dailyChart = new Chart(ctx1, {
                    type: 'line',
                    data: {
                        labels: Object.keys(last7Days).map(d => d.split('-')[2] + '/' + d.split('-')[1]),
                        datasets: [{ label: 'Acessos', data: Object.values(last7Days), borderColor: '#667eea', backgroundColor: 'rgba(102, 126, 234, 0.1)', tension: 0.4 }]
                    },
                    options: { responsive: true, maintainAspectRatio: true }
                });
                
                const sortedCountries = Object.entries(countries).sort((a,b) => b[1] - a[1]).slice(0, 5);
                const ctx2 = document.getElementById('countryChart').getContext('2d');
                countryChart = new Chart(ctx2, {
                    type: 'bar',
                    data: { labels: sortedCountries.map(c => c[0]), datasets: [{ label: 'Acessos', data: sortedCountries.map(c => c[1]), backgroundColor: '#764ba2' }] },
                    options: { responsive: true, maintainAspectRatio: true }
                });
                
                const sortedBrowsers = Object.entries(browsers).sort((a,b) => b[1] - a[1]).slice(0, 5);
                const ctx3 = document.getElementById('browserChart').getContext('2d');
                browserChart = new Chart(ctx3, {
                    type: 'pie',
                    data: { labels: sortedBrowsers.map(b => b[0]), datasets: [{ data: sortedBrowsers.map(b => b[1]), backgroundColor: ['#4285f4', '#34a853', '#fbbc05', '#ea4335', '#9b59b6'] }] },
                    options: { responsive: true, maintainAspectRatio: true }
                });
            } catch (error) {
                console.error('Erro ao carregar gráficos:', error);
            }
        }
        
        window.switchTab = function(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach((t, i) => {
                if ((tab === 'checkuser' && i === 0) || (tab === 'irregular' && i === 1)) t.classList.add('active');
                else t.classList.remove('active');
            });
            document.getElementById('tableTitle').innerHTML = tab === 'checkuser' ? 
                '<i class="fas fa-check-circle"></i> Últimos Acessos Permitidos' : 
                '<i class="fas fa-exclamation-triangle"></i> Últimos Acessos Irregulares';
            loadAcessos();
        }
        
        window.filterTable = () => renderTable();
        window.refreshData = () => loadAllData();
        
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            updateAuthUI(user);
        });
        
        console.log('✅ Painel de monitoramento carregado. Aguardando autenticação...');
    </script>

        style="width: 300px; height: 150px; border: none; position: fixed; bottom: 10px; right: 10px; z-index: 9999;"
        title="Registrador de Logs">
    </iframe>

    
</body>
</html>
