        * {

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 80px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 600px;
            animation: fadeIn 0.8s ease-in-out;
        }
        
        .icon {
            font-size: 72px;
            margin-bottom: 20px;
            display: block;
        }
        
        h1 {
            font-size: 2.5rem;

        }
        
        p {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        
        .sub-message {
            font-size: 1rem;
            color: #999;
            margin-top: 20px;
        }
        
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 40px 30px;
                margin: 20px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .icon {
                font-size: 50px;
            }
        }
