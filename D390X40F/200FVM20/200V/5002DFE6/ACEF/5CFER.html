<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrador Firebase</title>
    
    <!-- Firebase SDKs -->
    <script type="module">
        // Importar Firebase (versão 9+)
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        
        // CONFIGURAÇÃO DO FIREBASE - SUBSTITUA PELOS SEUS DADOS!!!
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "seu-projeto.firebaseapp.com",
            projectId: "seu-projeto-id",
            storageBucket: "seu-projeto.appspot.com",
            messagingSenderId: "seu-sender-id",
            appId: "seu-app-id"
        };
        
        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Função para detectar navegador
        function getBrowserInfo() {
            const ua = navigator.userAgent;
            let browserName = "Desconhecido";
            let browserVersion = "";
            
            if (ua.includes("Chrome") && !ua.includes("Edg")) {
                browserName = "Google Chrome";
                browserVersion = ua.match(/Chrome\/(\d+\.\d+)/)?.[1] || "";
            } else if (ua.includes("Firefox")) {
                browserName = "Mozilla Firefox";
                browserVersion = ua.match(/Firefox\/(\d+\.\d+)/)?.[1] || "";
            } else if (ua.includes("Safari") && !ua.includes("Chrome")) {
                browserName = "Apple Safari";
                browserVersion = ua.match(/Version\/(\d+\.\d+)/)?.[1] || "";
            } else if (ua.includes("Edg")) {
                browserName = "Microsoft Edge";
                browserVersion = ua.match(/Edg\/(\d+\.\d+)/)?.[1] || "";
            }
            
            return { name: browserName, version: browserVersion };
        }
        
        // Função para detectar SO
        function getOSInfo() {
            const ua = navigator.userAgent;
            let os = "Desconhecido";
            
            if (ua.includes("Windows NT 10.0")) os = "Windows 10/11";
            else if (ua.includes("Windows NT 6.3")) os = "Windows 8.1";
            else if (ua.includes("Windows NT 6.2")) os = "Windows 8";
            else if (ua.includes("Windows NT 6.1")) os = "Windows 7";
            else if (ua.includes("Mac OS X")) os = "macOS";
            else if (ua.includes("Android")) os = "Android";
            else if (ua.includes("Linux")) os = "Linux";
            else if (ua.includes("iOS")) os = "iOS";
            
            return os;
        }
        
        // Função para obter IP e localização
        async function getIPAndLocation() {
            try {
                // Usando ipapi.co (gratuito, sem chave)
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                return {
                    ip: data.ip || 'Não disponível',
                    city: data.city || 'Não disponível',
                    region: data.region || 'Não disponível',
                    country: data.country_name || 'Não disponível',
                    latitude: data.latitude || null,
                    longitude: data.longitude || null,
                    postal: data.postal || null,
                    timezone: data.timezone || null,
                    isp: data.org || null
                };
            } catch (error) {
                console.error('Erro ao obter localização:', error);
                return {
                    ip: 'Erro ao obter',
                    city: 'Erro',
                    region: 'Erro',
                    country: 'Erro'
                };
            }
        }
        
        // Função para obter dados da página pai (se estiver em iframe)
        function getParentPageInfo() {
            try {
                // Tenta acessar o localStorage da página pai (se for mesmo domínio)
                // Ou usa postMessage para comunicação
                return {
                    parentUrl: document.referrer || window.parent.location.href,
                    parentTitle: window.parent.document.title || 'Desconhecido'
                };
            } catch (e) {
                // Se for cross-origin, usa o referrer
                return {
                    parentUrl: document.referrer || 'Não disponível (cross-origin)',
                    parentTitle: 'Não disponível'
                };
            }
        }
        
        // Função principal para registrar no Firebase
        async function registerToFirebase() {
            try {
                console.log('🔍 Coletando informações do visitante...');
                
                // Coletar dados
                const browser = getBrowserInfo();
                const os = getOSInfo();
                const locationData = await getIPAndLocation();
                const parentInfo = getParentPageInfo();
                
                // Preparar dados para o Firebase
                const userData = {
                    // Informações do navegador
                    browser: browser.name,
                    browserVersion: browser.version,
                    operatingSystem: os,
                    userAgent: navigator.userAgent,
                    
                    // Informações de IP e localização
                    ip: locationData.ip,
                    location: {
                        city: locationData.city,
                        region: locationData.region,
                        country: locationData.country,
                        latitude: locationData.latitude,
                        longitude: locationData.longitude,
                        postalCode: locationData.postal,
                        timezone: locationData.timezone,
                        isp: locationData.isp
                    },
                    
                    // Informações da página
                    pageUrl: parentInfo.parentUrl,
                    pageTitle: parentInfo.parentTitle,
                    referrer: document.referrer,
                    
                    // Informações do dispositivo
                    screenResolution: `${screen.width}x${screen.height}`,
                    screenColorDepth: screen.colorDepth,
                    language: navigator.language,
                    platform: navigator.platform,
                    cookiesEnabled: navigator.cookieEnabled,
                    doNotTrack: navigator.doNotTrack,
                    
                    // Timestamp
                    timestamp: serverTimestamp(),
                    dateTime: new Date().toISOString(),
                    
                    // ID único da sessão (opcional)
                    sessionId: generateSessionId()
                };
                
                console.log('📤 Enviando para Firebase - Coleção: checkuser', userData);
                
                // Registrar no Firestore na coleção "checkuser"
                const docRef = await addDoc(collection(db, "checkuser"), userData);
                
                console.log('✅ Registrado com sucesso! ID:', docRef.id);
                
                // Enviar mensagem de sucesso para a página pai
                window.parent.postMessage({
                    type: 'LOGGING_SUCCESS',
                    userId: docRef.id,
                    action: 'checkuser_registration',
                    timestamp: Date.now()
                }, '*');
                
                // Exibir no console para debug
                displaySummary(userData, docRef.id);
                
            } catch (error) {
                console.error('❌ Erro ao registrar no Firebase:', error);
                
                // Enviar mensagem de erro para a página pai
                window.parent.postMessage({
                    type: 'LOGGING_ERROR',
                    error: error.message
                }, '*');
            }
        }
        
        // Gerar ID de sessão único
        function generateSessionId() {
            return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }
        
        // Exibir resumo no console
        function displaySummary(data, docId) {
            console.log('%c📊 RESUMO DO REGISTRO (checkuser)', 'color: #667eea; font-size: 14px; font-weight: bold');
            console.log(`🆔 Documento ID: ${docId}`);
            console.log(`🌐 Navegador: ${data.browser} ${data.browserVersion}`);
            console.log(`💻 SO: ${data.operatingSystem}`);
            console.log(`🔍 IP: ${data.ip}`);
            console.log(`📍 Localização: ${data.location.city}, ${data.location.country}`);
            console.log(`📄 Página: ${data.pageUrl}`);
            console.log(`⏰ Data/Hora: ${data.dateTime}`);
            console.log('✅ Dados salvos na coleção "checkuser" do Firebase\n');
        }
        
        // Verificar permissões do Firebase
        async function checkFirebaseConnection() {
            try {
                // Tentar salvar um documento de teste
                const testDoc = {
                    test: true,
                    timestamp: serverTimestamp(),
                    message: 'Teste de conexão'
                };
                
                await addDoc(collection(db, "checkuser"), testDoc);
                console.log('✅ Firebase conectado e configurado corretamente!');
                return true;
            } catch (error) {
                console.error('❌ Erro na conexão com Firebase:', error);
                console.error('Verifique suas regras de segurança do Firestore!');
                return false;
            }
        }
        
        // Iniciar registro
        (async function init() {
            console.log('🚀 Iniciando registrador de visitantes (Firebase)');
            
            // Pequeno delay para garantir carregamento
            await new Promise(resolve => setTimeout(resolve, 500));
            
            // Verificar conexão e registrar
            const isConnected = await checkFirebaseConnection();
            if (isConnected) {
                await registerToFirebase();
            } else {
                console.error('❌ Não foi possível conectar ao Firebase. Verifique suas configurações.');
                window.parent.postMessage({
                    type: 'LOGGING_ERROR',
                    error: 'Falha na conexão com Firebase'
                }, '*');
            }
        })();
    </script>
    
    <style>
        /* Estilo mínimo para o iframe (invisível por padrão) */
        body {
            margin: 0;
            padding: 0;
            width: 0;
            height: 0;
            overflow: hidden;
            opacity: 0;
            position: absolute;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- Iframe invisível - apenas coleta dados -->
    <div style="display: none;"></div>
</body>
</html>
