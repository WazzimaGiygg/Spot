<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACEF</title>
</head>
<body>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        
        // Configuração Firebase (MESMA do admin)
        const firebaseConfig = {
            apiKey: "AIzaSyB9GkSqTIZ0kbVsba_WOdQeVAETrF9qna0",
            authDomain: "wzzm-ce3fc.firebaseapp.com",
            projectId: "wzzm-ce3fc",
            storageBucket: "wzzm-ce3fc.appspot.com",
            messagingSenderId: "249427877153",
            appId: "1:249427877153:web:0e4297294794a5aadeb260"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        async function registrarVisitante() {
            try {
                console.log('🚀 Iniciando registro...');
                
                // 1. Obter IP e localização
                console.log('📡 Obtendo IP...');
                const respostaIP = await fetch('https://ipapi.co/json/');
                const dadosIP = await respostaIP.json();
                console.log('✅ IP obtido:', dadosIP.ip);
                
                // 2. Coletar dados do navegador
                const userAgent = navigator.userAgent;
                let browser = "Desconhecido";
                if (userAgent.includes("Chrome")) browser = "Chrome";
                else if (userAgent.includes("Firefox")) browser = "Firefox";
                else if (userAgent.includes("Safari")) browser = "Safari";
                else if (userAgent.includes("Edge")) browser = "Edge";
                
                let os = "Desconhecido";
                if (userAgent.includes("Windows")) os = "Windows";
                else if (userAgent.includes("Mac")) os = "macOS";
                else if (userAgent.includes("Linux")) os = "Linux";
                else if (userAgent.includes("Android")) os = "Android";
                else if (userAgent.includes("iOS")) os = "iOS";
                
                // 3. Preparar dados
                const dados = {
                    browser: browser,
                    operatingSystem: os,
                    userAgent: userAgent,
                    ip: dadosIP.ip,
                    location: {
                        city: dadosIP.city || 'Desconhecido',
                        region: dadosIP.region || 'Desconhecido',
                        country: dadosIP.country_name || 'Desconhecido',
                        latitude: dadosIP.latitude || null,
                        longitude: dadosIP.longitude || null
                    },
                    pageUrl: document.referrer || window.location.href,
                    screenResolution: `${screen.width}x${screen.height}`,
                    language: navigator.language,
                    registeredAtISO: new Date().toISOString(),
                    timestamp: serverTimestamp(),
                    sessionId: Date.now() + '_' + Math.random().toString(36).substr(2, 6)
                };
                
                console.log('📤 Enviando para Firebase...', dados);
                
                // 4. Salvar no Firebase
                const docRef = await addDoc(collection(db, "checkuser"), dados);
                
                console.log('✅ REGISTRADO COM SUCESSO!');
                console.log('📄 ID do documento:', docRef.id);
                console.log('🌐 Navegador:', browser);
                console.log('💻 SO:', os);
                console.log('🔍 IP:', dadosIP.ip);
                console.log('📍 Local:', dadosIP.city, '-', dadosIP.country_name);
                console.log('📅 Data:', new Date().toLocaleString());
                
                // Mostrar na página (opcional, para debug)
                const div = document.createElement('div');
                div.style.cssText = 'position:fixed; bottom:10px; right:10px; background:green; color:white; padding:10px; border-radius:5px; z-index:9999; font-size:12px;';
                div.innerHTML = `✅ Registrado: ${browser} | ${dadosIP.ip} | ${dadosIP.city}`;
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 5000);
                
            } catch (erro) {
                console.error('❌ ERRO AO REGISTRAR:', erro);
                console.error('Mensagem:', erro.message);
                
                // Mostrar erro na página
                const div = document.createElement('div');
                div.style.cssText = 'position:fixed; bottom:10px; right:10px; background:red; color:white; padding:10px; border-radius:5px; z-index:9999; font-size:12px; max-width:300px;';
                div.innerHTML = `❌ Erro: ${erro.message}`;
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 10000);
            }
        }
        
        // Executar quando a página carregar
        registrarVisitante();
    </script>
    
    <style>
        body { margin: 0; padding: 0; }
        /* Iframe invisível */
        body { width: 0; height: 0; overflow: hidden; opacity: 0; position: absolute; }
    </style>
</body>
</html>
