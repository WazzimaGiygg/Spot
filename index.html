<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WazzimaGiygg - Painel do Administrador</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="Favicom.png" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        body.light-mode {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            color: #1a1a2e;
        }

        body.light-mode .card,
        body.light-mode .modal-content,
        body.light-mode .links-container {
            background: white;
            border-color: #e0e0e0;
        }

        body.light-mode .link-card {
            background: #f8f9fa;
            border-color: #e0e0e0;
        }

        body.light-mode .link-card:hover {
            background: #e8ecf1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        body.light-mode .header {
            border-color: #e0e0e0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo i {
            font-size: 32px;
            color: #667eea;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .theme-toggle {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        body.light-mode .theme-toggle {
            background: #e0e0e0;
            color: #1a1a2e;
        }

        .theme-toggle:hover {
            background: rgba(102,126,234,0.3);
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 50px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .user-avatar img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-name {
            font-weight: 500;
            font-size: 14px;
        }

        .admin-badge {
            background: #ff9800;
            color: #1a1a2e;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .logout-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            color: #e0e0e0;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2a2a2a;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: #667eea;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 13px;
            color: #888;
            margin-top: 8px;
        }

        /* Welcome Section */
        .welcome-card {
            background: linear-gradient(135deg, #667eea20, #764ba220);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid #2a2a2a;
            text-align: center;
        }

        .welcome-card h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .welcome-card p {
            color: #888;
        }

        /* Links Container */
        .links-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid #2a2a2a;
        }

        .links-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .links-header h3 {
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-links {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 8px 16px;
            gap: 8px;
        }

        body.light-mode .search-links {
            background: #f0f0f0;
        }

        .search-links input {
            background: none;
            border: none;
            color: inherit;
            outline: none;
            font-size: 14px;
            min-width: 200px;
        }

        .search-links input::placeholder {
            color: #888;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding: 5px;
        }

        .link-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .link-card:hover {
            transform: translateX(5px);
            border-color: #667eea;
            background: rgba(102,126,234,0.1);
        }

        .link-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .link-icon i {
            font-size: 24px;
            color: white;
        }

        .link-info {
            flex: 1;
        }

        .link-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .link-url {
            font-size: 11px;
            color: #888;
            font-family: monospace;
            word-break: break-all;
        }

        .link-category {
            display: inline-block;
            background: rgba(102,126,234,0.2);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            margin-top: 5px;
            color: #667eea;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            padding: 25px;
            border: 1px solid #2a2a2a;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 20px;
        }

        .close-modal {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 24px;
        }

        .close-modal:hover {
            color: #fff;
        }

        .modal-body {
            text-align: center;
        }

        .modal-body p {
            margin-bottom: 20px;
            word-break: break-all;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            border: none;
        }

        .modal-btn.primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .modal-btn.secondary {
            background: rgba(255,255,255,0.1);
            color: #e0e0e0;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2a2a2a;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Login Screen */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: rgba(255,255,255,0.05);
            border-radius: 32px;
            padding: 50px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid #2a2a2a;
            backdrop-filter: blur(10px);
        }

        .login-box h2 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-box p {
            color: #888;
            margin-bottom: 30px;
        }

        .login-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.3);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1100;
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.success {
            background: #4caf50;
        }

        .toast.error {
            background: #f44336;
        }

        .toast.info {
            background: #2196f3;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #667eea;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
            }
            .header-actions {
                justify-content: space-between;
            }
            .links-grid {
                grid-template-columns: 1fr;
            }
            .search-links input {
                min-width: 150px;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // ============================================
        // CONFIGURAÇÃO DO FIREBASE
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyB9GkSqTIZ0kbVsba_WOdQeVAETrF9qna0",
            authDomain: "wzzm-ce3fc.firebaseapp.com",
            projectId: "wzzm-ce3fc",
            storageBucket: "wzzm-ce3fc.appspot.com",
            messagingSenderId: "249427877153",
            appId: "1:249427877153:web:0e4297294794a5aadeb260"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        // ============================================
        // LISTA DE LINKS DO ADMINISTRADOR
        // ============================================
        const ADMIN_LINKS = [
            { title: "Dashboard Admin", url: "https://wazzimagiygg.com/admin/dashboard.html", icon: "dashboard", category: "Administração" },
            { title: "Gerenciar Usuários", url: "https://wazzimagiygg.com/admin/gerenciarusuarios.html", icon: "people", category: "Usuários" },
            { title: "Logs do Sistema", url: "https://wazzimagiygg.com/admin/relatorios.html", icon: "analytics", category: "Monitoramento" },
            { title: "Firebase Console", url: "https://console.firebase.google.com/project/wzzm-ce3fc/overview", icon: "cloud", category: "Infraestrutura" },
            { title: "Firestore Database", url: "https://console.firebase.google.com/project/wzzm-ce3fc/firestore/data", icon: "storage", category: "Banco de Dados" },
            { title: "Authentication", url: "https://console.firebase.google.com/project/wzzm-ce3fc/authentication/users", icon: "lock", category: "Segurança" },
            { title: "Storage", url: "https://console.firebase.google.com/project/wzzm-ce3fc/storage", icon: "folder", category: "Arquivos" },
            { title: "Hosting", url: "https://console.firebase.google.com/project/wzzm-ce3fc/hosting", icon: "public", category: "Hospedagem" },
            { title: "Security Rules", url: "https://console.firebase.google.com/project/wzzm-ce3fc/firestore/rules", icon: "gavel", category: "Regras" },
            { title: "GitHub Repositórios", url: "https://github.com/WazzimaGiygg", icon: "code", category: "Desenvolvimento" },
            { title: "WazzimaGiygg Core", url: "https://wazzimagiygg.com/", icon: "home", category: "Site" },
            { title: "Bemtevi Social", url: "https://bemtevi.wazzimagiygg.com/", icon: "forum", category: "Rede Social" },
            { title: "Wiki Wazzima", url: "https://wiki.wazzimagiygg.com", icon: "menu_book", category: "Wiki" },
            { title: "Sistema de Tickets", url: "https://support.wazzimagiygg.com", icon: "confirmation_number", category: "Suporte" },
            { title: "MASPIA Store", url: "https://wazzimagiygg.com/MASPIA/", icon: "store", category: "E-commerce" },
            { title: "Acadêmico", url: "https://academico.wazzimagiygg.com", icon: "school", category: "Educação" },
            { title: "Search Engine", url: "https://search.wazzimagiygg.com", icon: "search", category: "Ferramentas" },
            { title: "Relatório Wikipédia", url: "https://wazzimagiygg.com/relatorio-wikipedia.html", icon: "report", category: "Documentos" },
            { title: "LGPD", url: "https://wazzimagiygg.com/LGPD", icon: "verified", category: "Legal" },
            { title: "Marco Civil", url: "https://wazzimagiygg.com/MarcoCivil", icon: "gavel", category: "Legal" },
            { title: "Desktop Access", url: "https://wazzimagiygg.com/desktop.html", icon: "desktop_windows", category: "Ferramentas" },
            { title: "Produtos Wazzima", url: "https://wazzimagiygg.com/produtos", icon: "shopping_bag", category: "Produtos" },
            { title: "Contato por Ticket", url: "https://support.wazzimagiygg.com/", icon: "support_agent", category: "Suporte" },
            { title: "Doações", url: "https://wazzimagiygg.com/donate/", icon: "favorite", category: "Financeiro" }
        ];

        let currentUser = null;
        let isAdmin = false;
        let searchTerm = '';
        let selectedLink = null;

        // ============================================
        // FUNÇÕES AUXILIARES
        // ============================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'info') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="material-icons">${type === 'success' ? 'check_circle' : type === 'error' ? 'error' : 'info'}</i>
                <span>${message}</span>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
            }
        }

        // ============================================
        // VERIFICAÇÃO DE ADMINISTRADOR
        // ============================================
        async function checkAdminStatus(user) {
            if (!user) return false;
            
            try {
                // Verificar na coleção users se o usuário é admin
                const userDoc = await db.collection('users').doc(user.uid).get();
                if (userDoc.exists && userDoc.data().isAdmin === true) {
                    return true;
                }
                
                // Verificar UID específico do admin principal
                if (user.uid === 'sZxfMuOBPbXdR8nttVPXIN8QOOl1') {
                    return true;
                }
                
                return false;
            } catch (error) {
                console.error('Erro ao verificar admin:', error);
                return false;
            }
        }

        // ============================================
        // FUNÇÕES DE AUTENTICAÇÃO
        // ============================================
        async function signIn() {
            try {
                const result = await auth.signInWithPopup(googleProvider);
                const user = result.user;
                
                isAdmin = await checkAdminStatus(user);
                
                if (!isAdmin) {
                    await auth.signOut();
                    alert('❌ Acesso negado! Você não é administrador deste sistema.');
                    return;
                }
                
                currentUser = user;
                renderMainApp();
                showToast(`Bem-vindo, ${user.displayName || user.email}!`, 'success');
            } catch (error) {
                console.error('Erro no login:', error);
                alert('Erro ao fazer login: ' + error.message);
            }
        }

        async function signOut() {
            await auth.signOut();
            currentUser = null;
            isAdmin = false;
            renderWelcomeScreen();
            showToast('Logout realizado com sucesso!', 'info');
        }

        // ============================================
        // FUNÇÕES DOS LINKS
        // ============================================
        function filterLinks() {
            if (!searchTerm) return ADMIN_LINKS;
            
            const term = searchTerm.toLowerCase();
            return ADMIN_LINKS.filter(link => 
                link.title.toLowerCase().includes(term) ||
                link.category.toLowerCase().includes(term) ||
                link.url.toLowerCase().includes(term)
            );
        }

        function renderLinks() {
            const container = document.getElementById('links-grid');
            if (!container) return;
            
            const filteredLinks = filterLinks();
            
            if (filteredLinks.length === 0) {
                container.innerHTML = '<div class="no-results"><i class="material-icons" style="font-size: 48px;">search_off</i><p>Nenhum link encontrado</p></div>';
                return;
            }
            
            container.innerHTML = filteredLinks.map(link => `
                <div class="link-card" onclick="openLinkModal('${escapeHtml(link.title)}', '${escapeHtml(link.url)}')">
                    <div class="link-icon">
                        <i class="material-icons">${link.icon}</i>
                    </div>
                    <div class="link-info">
                        <div class="link-title">${escapeHtml(link.title)}</div>
                        <div class="link-url">${escapeHtml(link.url.length > 50 ? link.url.substring(0, 50) + '...' : link.url)}</div>
                        <span class="link-category">${escapeHtml(link.category)}</span>
                    </div>
                </div>
            `).join('');
            
            // Atualizar contagem de links
            const linksCount = document.getElementById('links-count');
            if (linksCount) linksCount.textContent = filteredLinks.length;
        }

        function openLinkModal(title, url) {
            selectedLink = { title, url };
            const modal = document.getElementById('link-modal');
            document.getElementById('modal-link-title').textContent = title;
            document.getElementById('modal-link-url').textContent = url;
            modal.classList.add('show');
        }

        function closeModal() {
            document.getElementById('link-modal').classList.remove('show');
            selectedLink = null;
        }

        function openLink() {
            if (selectedLink) {
                window.open(selectedLink.url, '_blank');
                showToast(`Abrindo: ${selectedLink.title}`, 'info');
                closeModal();
            }
        }

        function copyLink() {
            if (selectedLink) {
                navigator.clipboard.writeText(selectedLink.url);
                showToast('Link copiado para a área de transferência!', 'success');
            }
        }

        // ============================================
        // RENDERIZAÇÃO
        // ============================================
        function renderWelcomeScreen() {
            document.getElementById('app').innerHTML = `
                <div class="login-container">
                    <div class="login-box">
                        <div class="logo" style="justify-content: center; margin-bottom: 20px;">
                            <i class="material-icons">admin_panel_settings</i>
                            <h2>AdminPanel</h2>
                        </div>
                        <h2>Painel do Administrador</h2>
                        <p>Acesso restrito a administradores autorizados</p>
                        <button class="login-btn" id="login-btn">
                            <i class="material-icons">login</i> Entrar com Google
                        </button>
                        <div style="margin-top: 20px; font-size: 12px; color: #666;">
                            🔒 Verificação de administrador via Firebase
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('login-btn')?.addEventListener('click', signIn);
        }

        function renderMainApp() {
            if (!currentUser || !isAdmin) {
                renderWelcomeScreen();
                return;
            }
            
            const displayName = currentUser.displayName || currentUser.email.split('@')[0];
            const photoURL = currentUser.photoURL;
            const totalLinks = ADMIN_LINKS.length;
            const categories = [...new Set(ADMIN_LINKS.map(l => l.category))];
            
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="header">
                        <div class="logo">
                            <i class="material-icons">admin_panel_settings</i>
                            <div>
                                <h1>AdminPanel</h1>
                                <p>Painel de Controle do Administrador</p>
                            </div>
                        </div>
                        <div class="header-actions">
                            <button class="theme-toggle" id="theme-toggle">
                                <i class="material-icons">dark_mode</i>
                            </button>
                        </div>
                        <div class="user-area">
                            <div class="user-info">
                                ${photoURL ? 
                                    `<img src="${photoURL}" class="user-avatar" style="object-fit: cover;">` : 
                                    `<div class="user-avatar">${displayName.charAt(0).toUpperCase()}</div>`
                                }
                                <span class="user-name">${escapeHtml(displayName)}</span>
                                <span class="admin-badge">Administrador</span>
                            </div>
                            <button class="logout-btn" id="logout-btn">
                                <i class="material-icons" style="font-size: 18px;">logout</i> Sair
                            </button>
                        </div>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number">${totalLinks}</div>
                            <div class="stat-label">Links Disponíveis</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="links-count">${totalLinks}</div>
                            <div class="stat-label">Links Filtrados</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${categories.length}</div>
                            <div class="stat-label">Categorias</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${new Date().getFullYear()}</div>
                            <div class="stat-label">WazzimaGiygg</div>
                        </div>
                    </div>
                    
                    <div class="welcome-card">
                        <h2>👋 Olá, ${escapeHtml(displayName)}</h2>
                        <p>Bem-vindo ao Painel do Administrador. Aqui você tem acesso rápido aos principais sistemas e ferramentas.</p>
                    </div>
                    
                    <div class="links-container">
                        <div class="links-header">
                            <h3>
                                <i class="material-icons">link</i>
                                Links Rápidos
                            </h3>
                            <div class="search-links">
                                <i class="material-icons" style="font-size: 18px;">search</i>
                                <input type="text" id="search-links" placeholder="Buscar links..." autocomplete="off">
                                <i class="material-icons" id="clear-search" style="font-size: 18px; cursor: pointer; display: none;">close</i>
                            </div>
                        </div>
                        <div id="links-grid" class="links-grid">
                            ${ADMIN_LINKS.map(link => `
                                <div class="link-card" onclick="openLinkModal('${escapeHtml(link.title)}', '${escapeHtml(link.url)}')">
                                    <div class="link-icon">
                                        <i class="material-icons">${link.icon}</i>
                                    </div>
                                    <div class="link-info">
                                        <div class="link-title">${escapeHtml(link.title)}</div>
                                        <div class="link-url">${escapeHtml(link.url.length > 50 ? link.url.substring(0, 50) + '...' : link.url)}</div>
                                        <span class="link-category">${escapeHtml(link.category)}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
                
                <div id="link-modal" class="modal">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h3 id="modal-link-title">Abrir Link</h3>
                            <button class="close-modal" onclick="closeModal()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <p id="modal-link-url"></p>
                            <div class="modal-buttons">
                                <button class="modal-btn primary" onclick="openLink()">
                                    <i class="material-icons">open_in_new</i> Abrir
                                </button>
                                <button class="modal-btn secondary" onclick="copyLink()">
                                    <i class="material-icons">content_copy</i> Copiar
                                </button>
                                <button class="modal-btn secondary" onclick="closeModal()">
                                    <i class="material-icons">close</i> Cancelar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Event Listeners
            document.getElementById('logout-btn')?.addEventListener('click', signOut);
            document.getElementById('theme-toggle')?.addEventListener('click', toggleTheme);
            
            const searchInput = document.getElementById('search-links');
            const clearBtn = document.getElementById('clear-search');
            
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    searchTerm = e.target.value;
                    if (searchTerm) {
                        clearBtn.style.display = 'flex';
                    } else {
                        clearBtn.style.display = 'none';
                    }
                    renderLinks();
                });
            }
            
            if (clearBtn) {
                clearBtn.addEventListener('click', () => {
                    searchInput.value = '';
                    searchTerm = '';
                    clearBtn.style.display = 'none';
                    renderLinks();
                });
            }
        }

        // ============================================
        // EXPOR FUNÇÕES GLOBAIS
        // ============================================
        window.openLinkModal = openLinkModal;
        window.closeModal = closeModal;
        window.openLink = openLink;
        window.copyLink = copyLink;
        
        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        loadTheme();
        
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                isAdmin = await checkAdminStatus(user);
                if (isAdmin) {
                    currentUser = user;
                    renderMainApp();
                } else {
                    await auth.signOut();
                    renderWelcomeScreen();
                }
            } else {
                renderWelcomeScreen();
            }
        });
    </script>
</body>
</html>
