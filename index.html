<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WazzimaGiygg - Gerenciador de Repositórios HTML</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            transition: background 0.3s, color 0.3s;
        }

        body.light-mode {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            color: #1a1a2e;
        }

        body.light-mode .repo-card,
        body.light-mode .stat-card,
        body.light-mode .modal-content {
            background: white;
            border-color: #e0e0e0;
        }

        body.light-mode .repo-header {
            background: #f8f9fa;
            border-color: #e0e0e0;
        }

        body.light-mode .file-item {
            border-color: #eee;
        }

        body.light-mode .file-item:hover {
            background: #f5f5f5;
        }

        body.light-mode .loading-files {
            color: #666;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        body.light-mode .header {
            border-color: #e0e0e0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo i {
            font-size: 32px;
            color: #667eea;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        /* Header Actions */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 8px 16px;
            gap: 8px;
        }

        body.light-mode .search-box {
            background: white;
            border: 1px solid #e0e0e0;
        }

        .search-box input {
            background: none;
            border: none;
            color: inherit;
            outline: none;
            font-size: 14px;
            min-width: 200px;
        }

        .search-box input::placeholder {
            color: #888;
        }

        .theme-toggle {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        body.light-mode .theme-toggle {
            background: #e0e0e0;
            color: #1a1a2e;
        }

        .theme-toggle:hover {
            background: rgba(102,126,234,0.3);
        }

        .export-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50px;
            padding: 8px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            transition: all 0.3s;
        }

        body.light-mode .export-btn {
            background: #e0e0e0;
            color: #1a1a2e;
        }

        .export-btn:hover {
            background: #667eea;
            color: white;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 50px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .user-avatar img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-name {
            font-weight: 500;
            font-size: 14px;
        }

        .admin-badge {
            background: #ff9800;
            color: #1a1a2e;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .login-btn, .logout-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn {
            background: rgba(255,255,255,0.1);
        }

        .login-btn:hover, .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.3);
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2a2a2a;
            transition: all 0.3s;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: #667eea;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 13px;
            color: #888;
            margin-top: 8px;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-chip {
            background: rgba(255,255,255,0.1);
            border: 1px solid #2a2a2a;
            border-radius: 50px;
            padding: 6px 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        body.light-mode .filter-chip {
            background: white;
            border-color: #e0e0e0;
        }

        .filter-chip.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        .filter-chip:hover:not(.active) {
            background: rgba(102,126,234,0.2);
        }

        /* Repositórios */
        .repos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .repo-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            border: 1px solid #2a2a2a;
            overflow: hidden;
            transition: all 0.3s;
        }

        .repo-card:hover {
            transform: translateY(-4px);
            border-color: #667eea;
        }

        .repo-header {
            background: linear-gradient(135deg, #1a1a2e, #0a0a0a);
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .repo-header i {
            font-size: 28px;
            color: #667eea;
        }

        .repo-header h3 {
            font-size: 16px;
            font-weight: 600;
            flex: 1;
        }

        .repo-header .repo-stats {
            font-size: 12px;
            color: #888;
        }

        .repo-files {
            max-height: 350px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            border-bottom: 1px solid #1a1a1a;
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-item:hover {
            background: rgba(102,126,234,0.1);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .file-info i {
            font-size: 18px;
            color: #e34c26;
        }

        .file-name {
            font-size: 13px;
            font-family: monospace;
        }

        .file-path {
            font-size: 10px;
            color: #666;
            margin-left: 8px;
        }

        .file-size {
            font-size: 11px;
            color: #666;
            margin-left: 10px;
        }

        .view-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .view-btn:hover {
            background: rgba(102,126,234,0.2);
        }

        .loading-files {
            padding: 20px;
            text-align: center;
            color: #888;
        }

        /* Preview Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1a1a1a;
            border-radius: 16px;
            width: 90%;
            max-width: 1000px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            border: 1px solid #2a2a2a;
        }

        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .modal-header h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .modal-header .modal-path {
            font-size: 11px;
            color: #888;
            font-family: monospace;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-action-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal-action-btn:hover {
            background: #667eea;
            color: white;
        }

        .close-modal {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 24px;
            transition: color 0.2s;
        }

        .close-modal:hover {
            color: #fff;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-body iframe {
            width: 100%;
            min-height: 550px;
            border: none;
            background: white;
            border-radius: 8px;
        }

        .modal-body .raw-content {
            background: #0d0d0d;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 12px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 600px;
        }

        .view-mode-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .view-mode-btn {
            background: #2a2a2a;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .view-mode-btn.active {
            background: #667eea;
        }

        .view-mode-btn:hover {
            background: #667eea;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2a2a2a;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Login Screen */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: rgba(255,255,255,0.05);
            border-radius: 32px;
            padding: 50px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid #2a2a2a;
            backdrop-filter: blur(10px);
        }

        .login-box h2 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-box p {
            color: #888;
            margin-bottom: 30px;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1100;
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.success {
            background: #4caf50;
        }

        .toast.error {
            background: #f44336;
        }

        .toast.info {
            background: #2196f3;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #667eea;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
            }
            .header-actions {
                justify-content: space-between;
            }
            .search-box input {
                min-width: 150px;
            }
            .repos-grid {
                grid-template-columns: 1fr;
            }
            .modal-content {
                width: 95%;
            }
            .modal-body iframe {
                min-height: 400px;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        // ============================================
        // CONFIGURAÇÃO DO FIREBASE
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyB9GkSqTIZ0kbVsba_WOdQeVAETrF9qna0",
            authDomain: "wzzm-ce3fc.firebaseapp.com",
            projectId: "wzzm-ce3fc",
            storageBucket: "wzzm-ce3fc.appspot.com",
            messagingSenderId: "249427877153",
            appId: "1:249427877153:web:0e4297294794a5aadeb260"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        // ============================================
        // LISTA DE REPOSITÓRIOS
        // ============================================
        const REPOSITORIES = [
            { name: 'wazzimagiygg', url: 'https://api.github.com/repos/WazzimaGiygg/wazzimagiygg/contents', branch: 'main', raw: 'https://raw.githubusercontent.com/WazzimaGiygg/wazzimagiygg/main/', icon: 'public' },
            { name: 'bemtevi', url: 'https://api.github.com/repos/WazzimaGiygg/bemtevi/contents', branch: 'main', raw: 'https://raw.githubusercontent.com/WazzimaGiygg/bemtevi/main/', icon: 'forum' },
            { name: 'wiki', url: 'https://api.github.com/repos/WazzimaGiygg/wiki/contents', branch: 'main', raw: 'https://raw.githubusercontent.com/WazzimaGiygg/wiki/main/', icon: 'menu_book' },
            { name: 'Tickets', url: 'https://api.github.com/repos/WazzimaGiygg/Tickets/contents', branch: 'main', raw: 'https://raw.githubusercontent.com/WazzimaGiygg/Tickets/main/', icon: 'confirmation_number' },
            { name: 'MASPIA', url: 'https://api.github.com/repos/WazzimaGiygg/MASPIA/contents', branch: 'main', raw: 'https://raw.githubusercontent.com/WazzimaGiygg/MASPIA/main/', icon: 'security' },
            { name: 'Academico', url: 'https://api.github.com/repos/WazzimaGiygg/Academico/contents', branch: 'main', raw: 'https://raw.githubusercontent.com/WazzimaGiygg/Academico/main/', icon: 'school' },
            { name: 'WazzimaGiygg-Search', url: 'https://api.github.com/repos/WazzimaGiygg/WazzimaGiygg-Search/contents', branch: 'main', raw: 'https://raw.githubusercontent.com/WazzimaGiygg/WazzimaGiygg-Search/main/', icon: 'search' }
        ];

        // Lista de UIDs autorizados como administradores
        const ADMIN_UIDS = [
            'sZxfMuOBPbXdR8nttVPXIN8QOOl1'
        ];

        let currentUser = null;
        let isAdmin = false;
        let reposData = {};
        let currentFilter = 'all';
        let searchTerm = '';
        let currentViewMode = 'iframe';
        let currentHtmlContent = '';

        // ============================================
        // FUNÇÕES AUXILIARES
        // ============================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatFileSize(bytes) {
            if (!bytes) return '';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function showToast(message, type = 'info') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="material-icons">${type === 'success' ? 'check_circle' : type === 'error' ? 'error' : 'info'}</i>
                <span>${message}</span>
            `;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
            }
        }

        // Buscar arquivos .html de um repositório
        async function fetchHtmlFiles(repoName, apiUrl, rawUrl) {
            try {
                console.log(`📂 Buscando arquivos em ${repoName}...`);
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const htmlFiles = [];
                
                async function scanItems(items, currentPath = '') {
                    for (const item of items) {
                        if (item.type === 'file' && item.name.endsWith('.html')) {
                            htmlFiles.push({
                                name: item.name,
                                path: item.path,
                                size: item.size,
                                download_url: item.download_url,
                                raw_url: rawUrl + item.path,
                                html_url: item.html_url
                            });
                        } else if (item.type === 'dir') {
                            try {
                                const dirResponse = await fetch(item.url);
                                if (dirResponse.ok) {
                                    const dirData = await dirResponse.json();
                                    await scanItems(dirData, item.path + '/');
                                }
                            } catch (err) {
                                console.warn(`⚠️ Erro ao acessar diretório ${item.path}:`, err);
                            }
                        }
                    }
                }
                
                await scanItems(data);
                htmlFiles.sort((a, b) => a.name.localeCompare(b.name));
                
                console.log(`✅ ${repoName}: ${htmlFiles.length} arquivos HTML encontrados`);
                return htmlFiles;
                
            } catch (error) {
                console.error(`❌ Erro ao buscar ${repoName}:`, error);
                return [];
            }
        }

        // Buscar todos os repositórios
        async function loadAllRepositories() {
            if (!currentUser || !isAdmin) return;
            
            const reposContainer = document.getElementById('repos-container');
            if (reposContainer) {
                reposContainer.innerHTML = '<div class="loading"><div class="spinner"></div><p>Carregando repositórios...</p></div>';
            }
            
            let totalFiles = 0;
            let loadedCount = 0;
            
            for (const repo of REPOSITORIES) {
                const files = await fetchHtmlFiles(repo.name, repo.url, repo.raw);
                reposData[repo.name] = files;
                totalFiles += files.length;
                loadedCount++;
                
                // Atualizar estatísticas em tempo real
                const statsLoaded = document.getElementById('stats-loaded');
                if (statsLoaded) statsLoaded.textContent = loadedCount;
            }
            
            // Atualizar estatísticas finais
            const statsHtml = document.getElementById('stats-html');
            if (statsHtml) statsHtml.textContent = totalFiles;
            
            // Renderizar repositórios
            renderRepositories();
            showToast(`${totalFiles} arquivos HTML carregados de ${REPOSITORIES.length} repositórios`, 'success');
        }

        // Filtrar arquivos
        function filterFiles() {
            if (Object.keys(reposData).length === 0) return;
            
            for (const repo of REPOSITORIES) {
                const files = reposData[repo.name] || [];
                let filteredFiles = files;
                
                // Filtrar por termo de busca
                if (searchTerm) {
                    filteredFiles = filteredFiles.filter(file => 
                        file.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        file.path.toLowerCase().includes(searchTerm.toLowerCase())
                    );
                }
                
                // Renderizar arquivos filtrados
                const filesContainer = document.getElementById(`files-${repo.name.replace(/[^a-zA-Z0-9]/g, '_')}`);
                if (filesContainer) {
                    if (filteredFiles.length === 0) {
                        filesContainer.innerHTML = '<div class="loading-files">📭 Nenhum arquivo encontrado</div>';
                    } else {
                        filesContainer.innerHTML = '';
                        filteredFiles.forEach(file => {
                            const fileDiv = document.createElement('div');
                            fileDiv.className = 'file-item';
                            fileDiv.innerHTML = `
                                <div class="file-info">
                                    <i class="material-icons">description</i>
                                    <div>
                                        <div class="file-name">${escapeHtml(file.name)}</div>
                                        <div class="file-path">${escapeHtml(file.path)}</div>
                                    </div>
                                    <div class="file-size">${formatFileSize(file.size)}</div>
                                </div>
                                <button class="view-btn" onclick="previewFile('${escapeHtml(file.raw_url)}', '${escapeHtml(file.name)}', '${escapeHtml(repo.name)}')">
                                    <i class="material-icons" style="font-size: 16px;">visibility</i> Visualizar
                                </button>
                            `;
                            filesContainer.appendChild(fileDiv);
                        });
                    }
                }
            }
            
            // Atualizar contagem visível
            const totalVisible = countVisibleFiles();
            const statsFiltered = document.getElementById('stats-filtered');
            if (statsFiltered) statsFiltered.textContent = totalVisible;
        }

        function countVisibleFiles() {
            let count = 0;
            for (const repo of REPOSITORIES) {
                const files = reposData[repo.name] || [];
                let filteredFiles = files;
                if (searchTerm) {
                    filteredFiles = filteredFiles.filter(file => 
                        file.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        file.path.toLowerCase().includes(searchTerm.toLowerCase())
                    );
                }
                count += filteredFiles.length;
            }
            return count;
        }

        // Renderizar lista de repositórios
        function renderRepositories() {
            const container = document.getElementById('repos-container');
            if (!container) return;
            
            if (Object.keys(reposData).length === 0) {
                container.innerHTML = '<div class="loading"><p>Nenhum arquivo HTML encontrado</p></div>';
                return;
            }
            
            container.innerHTML = '';
            
            for (const repo of REPOSITORIES) {
                const files = reposData[repo.name] || [];
                const repoIcon = repo.icon;
                
                const repoCard = document.createElement('div');
                repoCard.className = 'repo-card';
                repoCard.setAttribute('data-repo', repo.name);
                repoCard.innerHTML = `
                    <div class="repo-header">
                        <i class="material-icons">${repoIcon}</i>
                        <h3>${repo.name}</h3>
                        <div class="repo-stats">📄 ${files.length} arquivos</div>
                    </div>
                    <div class="repo-files" id="files-${repo.name.replace(/[^a-zA-Z0-9]/g, '_')}">
                        ${files.length === 0 ? '<div class="loading-files">Nenhum arquivo HTML encontrado</div>' : ''}
                    </div>
                `;
                
                container.appendChild(repoCard);
                
                // Preencher arquivos
                const filesContainer = repoCard.querySelector(`.repo-files`);
                if (files.length > 0) {
                    let displayFiles = files;
                    if (searchTerm) {
                        displayFiles = files.filter(file => 
                            file.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                            file.path.toLowerCase().includes(searchTerm.toLowerCase())
                        );
                    }
                    
                    if (displayFiles.length === 0) {
                        filesContainer.innerHTML = '<div class="loading-files">📭 Nenhum arquivo encontrado</div>';
                    } else {
                        displayFiles.forEach(file => {
                            const fileDiv = document.createElement('div');
                            fileDiv.className = 'file-item';
                            fileDiv.innerHTML = `
                                <div class="file-info">
                                    <i class="material-icons">description</i>
                                    <div>
                                        <div class="file-name">${escapeHtml(file.name)}</div>
                                        <div class="file-path">${escapeHtml(file.path)}</div>
                                    </div>
                                    <div class="file-size">${formatFileSize(file.size)}</div>
                                </div>
                                <button class="view-btn" onclick="previewFile('${escapeHtml(file.raw_url)}', '${escapeHtml(file.name)}', '${escapeHtml(repo.name)}')">
                                    <i class="material-icons" style="font-size: 16px;">visibility</i> Visualizar
                                </button>
                            `;
                            filesContainer.appendChild(fileDiv);
                        });
                    }
                }
            }
        }

        // Visualizar arquivo
        window.previewFile = function(url, filename, repoName) {
            const modal = document.getElementById('preview-modal');
            const modalTitle = document.getElementById('modal-title');
            const modalPath = document.getElementById('modal-path');
            const modalBody = document.getElementById('modal-body');
            
            modalTitle.textContent = filename;
            modalPath.textContent = `${repoName} / ${filename}`;
            modalBody.innerHTML = '<div class="loading"><div class="spinner"></div><p>Carregando arquivo...</p></div>';
            modal.classList.add('show');
            
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('Erro ao carregar arquivo');
                    return response.text();
                })
                .then(html => {
                    currentHtmlContent = html;
                    renderPreviewContent('iframe');
                })
                .catch(error => {
                    modalBody.innerHTML = `<div style="text-align:center; padding:40px; color:#f44336;">❌ Erro ao carregar: ${error.message}</div>`;
                });
        };
        
        function renderPreviewContent(mode) {
            currentViewMode = mode;
            const container = document.getElementById('preview-content');
            if (!container) return;
            
            if (mode === 'iframe') {
                container.innerHTML = `<iframe srcdoc="${escapeHtml(currentHtmlContent).replace(/"/g, '&quot;')}" style="width:100%; min-height:550px; border:none; background:white; border-radius:8px;"></iframe>`;
            } else {
                container.innerHTML = `<pre class="raw-content" style="max-height:550px; overflow:auto;">${escapeHtml(currentHtmlContent)}</pre>`;
            }
            
            // Atualizar botões ativos
            document.querySelectorAll('.view-mode-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.mode === mode) {
                    btn.classList.add('active');
                }
            });
        }
        
        window.viewAsIframe = function() {
            renderPreviewContent('iframe');
        };
        
        window.viewAsCode = function() {
            renderPreviewContent('code');
        };
        
        window.openInNewTab = function() {
            const blob = new Blob([currentHtmlContent], { type: 'text/html' });
            const blobUrl = URL.createObjectURL(blob);
            window.open(blobUrl, '_blank');
            URL.revokeObjectURL(blobUrl);
        };
        
        window.copyContent = function() {
            navigator.clipboard.writeText(currentHtmlContent);
            showToast('Código copiado para a área de transferência!', 'success');
        };
        
        window.downloadFile = function(filename) {
            const blob = new Blob([currentHtmlContent], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
            URL.revokeObjectURL(blob);
            showToast('Arquivo baixado com sucesso!', 'success');
        };

        function closeModal() {
            document.getElementById('preview-modal').classList.remove('show');
        }
        
        function exportFileList() {
            const allFiles = [];
            for (const repo of REPOSITORIES) {
                const files = reposData[repo.name] || [];
                files.forEach(file => {
                    allFiles.push({
                        repositorio: repo.name,
                        arquivo: file.name,
                        caminho: file.path,
                        tamanho: formatFileSize(file.size),
                        url: file.raw_url
                    });
                });
            }
            
            const csv = [
                ['Repositório', 'Arquivo', 'Caminho', 'Tamanho', 'URL'],
                ...allFiles.map(f => [f.repositorio, f.arquivo, f.caminho, f.tamanho, f.url])
            ].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `html_files_export_${new Date().toISOString().slice(0,19)}.csv`;
            link.click();
            URL.revokeObjectURL(blob);
            showToast('Lista exportada com sucesso!', 'success');
        }

        // ============================================
        // AUTENTICAÇÃO
        // ============================================
        async function checkAdminStatus(user) {
            if (!user) return false;
            
            if (ADMIN_UIDS.includes(user.uid)) {
                return true;
            }
            
            // Tentar verificar no Firestore
            try {
                const db = firebase.firestore();
                const adminDoc = await db.collection('admins').doc(user.uid).get();
                if (adminDoc.exists && adminDoc.data().isAdmin === true) {
                    return true;
                }
            } catch (error) {
                console.warn('Erro ao verificar admin no Firestore:', error);
            }
            
            return false;
        }

        async function signIn() {
            try {
                const result = await auth.signInWithPopup(googleProvider);
                const user = result.user;
                
                isAdmin = await checkAdminStatus(user);
                
                if (!isAdmin) {
                    await auth.signOut();
                    alert('❌ Acesso negado! Você não é administrador deste sistema.');
                    return;
                }
                
                currentUser = user;
                renderMainApp();
                showToast(`Bem-vindo, ${user.displayName || user.email}!`, 'success');
            } catch (error) {
                console.error('Erro no login:', error);
                alert('Erro ao fazer login: ' + error.message);
            }
        }

        async function signOut() {
            await auth.signOut();
            currentUser = null;
            isAdmin = false;
            reposData = {};
            renderWelcomeScreen();
            showToast('Logout realizado com sucesso!', 'info');
        }

        // ============================================
        // RENDERIZAÇÃO
        // ============================================
        function renderWelcomeScreen() {
            document.getElementById('app').innerHTML = `
                <div class="login-container">
                    <div class="login-box">
                        <div class="logo" style="justify-content: center; margin-bottom: 20px;">
                            <i class="material-icons">folder_managed</i>
                            <h2>RepoManager</h2>
                        </div>
                        <h2>Gerenciador de Repositórios</h2>
                        <p>Gerencie todos os arquivos HTML dos seus repositórios GitHub em um só lugar</p>
                        <button class="login-btn" id="login-btn">
                            <i class="material-icons">login</i> Entrar com Google
                        </button>
                        <div style="margin-top: 20px; font-size: 12px; color: #666;">
                            🔒 Acesso restrito a administradores autorizados
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('login-btn')?.addEventListener('click', signIn);
        }

        function renderMainApp() {
            if (!currentUser || !isAdmin) {
                renderWelcomeScreen();
                return;
            }
            
            const displayName = currentUser.displayName || currentUser.email.split('@')[0];
            const photoURL = currentUser.photoURL;
            
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="header">
                        <div class="logo">
                            <i class="material-icons">folder_managed</i>
                            <div>
                                <h1>RepoManager</h1>
                                <p>Gerenciador de Repositórios HTML</p>
                            </div>
                        </div>
                        <div class="header-actions">
                            <div class="search-box">
                                <i class="material-icons" style="font-size: 18px;">search</i>
                                <input type="text" id="search-input" placeholder="Buscar arquivos..." autocomplete="off">
                                <i class="material-icons" id="clear-search" style="font-size: 18px; cursor: pointer; display: none;">close</i>
                            </div>
                            <button class="theme-toggle" id="theme-toggle">
                                <i class="material-icons">dark_mode</i>
                            </button>
                            <button class="export-btn" id="export-btn">
                                <i class="material-icons" style="font-size: 18px;">download</i> Exportar
                            </button>
                        </div>
                        <div class="user-area">
                            <div class="user-info">
                                ${photoURL ? 
                                    `<img src="${photoURL}" class="user-avatar" style="object-fit: cover;">` : 
                                    `<div class="user-avatar">${displayName.charAt(0).toUpperCase()}</div>`
                                }
                                <span class="user-name">${escapeHtml(displayName)}</span>
                                <span class="admin-badge">Administrador</span>
                            </div>
                            <button class="logout-btn" id="logout-btn">
                                <i class="material-icons" style="font-size: 18px;">logout</i> Sair
                            </button>
                        </div>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card" onclick="document.getElementById('search-input').value=''; searchTerm=''; filterFiles();">
                            <div class="stat-number" id="stats-repos">${REPOSITORIES.length}</div>
                            <div class="stat-label">Repositórios</div>
                        </div>
                        <div class="stat-card" onclick="document.getElementById('search-input').value=''; searchTerm=''; filterFiles();">
                            <div class="stat-number" id="stats-html">0</div>
                            <div class="stat-label">Total de Arquivos</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="stats-filtered">0</div>
                            <div class="stat-label">Arquivos Visíveis</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="stats-loaded">0</div>
                            <div class="stat-label">Repositórios Carregados</div>
                        </div>
                    </div>
                    
                    <div id="repos-container" class="repos-grid">
                        <div class="loading"><div class="spinner"></div><p>Carregando repositórios...</p></div>
                    </div>
                </div>
                
                <div id="preview-modal" class="modal">
                    <div class="modal-content">
                        <div class="modal-header">
                            <div>
                                <h3 id="modal-title">Visualizando arquivo</h3>
                                <div class="modal-path" id="modal-path"></div>
                            </div>
                            <div class="modal-actions">
                                <button class="modal-action-btn" onclick="openInNewTab()">
                                    <i class="material-icons" style="font-size: 16px;">open_in_new</i> Nova Guia
                                </button>
                                <button class="modal-action-btn" onclick="copyContent()">
                                    <i class="material-icons" style="font-size: 16px;">content_copy</i> Copiar
                                </button>
                                <button class="modal-action-btn" onclick="downloadFile(modalTitle.textContent)">
                                    <i class="material-icons" style="font-size: 16px;">download</i> Baixar
                                </button>
                                <button class="close-modal" onclick="closeModal()">&times;</button>
                            </div>
                        </div>
                        <div class="modal-body">
                            <div class="view-mode-buttons">
                                <button class="view-mode-btn active" data-mode="iframe" onclick="viewAsIframe()">
                                    <i class="material-icons" style="font-size: 16px;">web</i> Visualizar Página
                                </button>
                                <button class="view-mode-btn" data-mode="code" onclick="viewAsCode()">
                                    <i class="material-icons" style="font-size: 16px;">code</i> Ver Código
                                </button>
                            </div>
                            <div id="preview-content">
                                <div class="loading"><div class="spinner"></div><p>Carregando...</p></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Event Listeners
            document.getElementById('logout-btn')?.addEventListener('click', signOut);
            document.getElementById('theme-toggle')?.addEventListener('click', toggleTheme);
            document.getElementById('export-btn')?.addEventListener('click', exportFileList);
            
            const searchInput = document.getElementById('search-input');
            const clearBtn = document.getElementById('clear-search');
            
            searchInput?.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                if (searchTerm) {
                    clearBtn.style.display = 'flex';
                } else {
                    clearBtn.style.display = 'none';
                }
                filterFiles();
                
                const statsFiltered = document.getElementById('stats-filtered');
                if (statsFiltered) statsFiltered.textContent = countVisibleFiles();
            });
            
            clearBtn?.addEventListener('click', () => {
                searchInput.value = '';
                searchTerm = '';
                clearBtn.style.display = 'none';
                filterFiles();
                const statsFiltered = document.getElementById('stats-filtered');
                if (statsFiltered) statsFiltered.textContent = countVisibleFiles();
            });
            
            // Carregar repositórios
            loadAllRepositories();
        }

        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        loadTheme();
        
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                isAdmin = await checkAdminStatus(user);
                if (isAdmin) {
                    currentUser = user;
                    renderMainApp();
                } else {
                    await auth.signOut();
                    renderWelcomeScreen();
                }
            } else {
                renderWelcomeScreen();
            }
        });
    </script>
